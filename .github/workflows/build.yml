name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          openjdk-17-jdk \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          build-essential \
          git \
          wget \
          unzip \
          libffi-dev \
          libssl-dev \
          zip \
          python3-pip \
          python3-dev \
          python3-venv

    - name: Install Android SDK and aidl
      run: |
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip commandlinetools-linux-11076708_latest.zip
        mkdir -p android-sdk/cmdline-tools
        mv cmdline-tools android-sdk/cmdline-tools/latest
        export ANDROID_SDK_ROOT=$PWD/android-sdk
        export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
        yes | sdkmanager --licenses
        sdkmanager "build-tools;33.0.2"
        sdkmanager "platform-tools"
        sdkmanager "platforms;android-30"
        sdkmanager "tools"

    - name: Set up environment variables
      run: |
        echo "ANDROID_SDK_ROOT=$PWD/android-sdk" >> $GITHUB_ENV
        echo "$PWD/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$PWD/android-sdk/platform-tools" >> $GITHUB_PATH
        echo "$PWD/android-sdk/build-tools/33.0.2" >> $GITHUB_PATH

    - name: Install Python and Buildozer
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install --user cython buildozer
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Checkout code
      run: |
        git clone https://github.com/${{ github.repository }}.git repo
        cd repo
        git checkout ${{ github.sha }}
        cp -r * ..
        cd ..

    - name: Configure Buildozer to use custom SDK
      run: |
        mkdir -p ~/.buildozer/android/platform
        rm -rf ~/.buildozer/android/platform/android-sdk
        ln -s $PWD/android-sdk ~/.buildozer/android/platform/android-sdk

    - name: Build APK
      run: |
        export ANDROID_SDK_ROOT=$PWD/android-sdk
        export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/build-tools/33.0.2:$PATH
        buildozer android debug deploy run
      env:
        BUILD_NUMBER: ${{ github.run_number }}
        ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: noct-app
        path: bin/*.apk
        retention-days: 30
