name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Java 17 and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            openjdk-17-jdk \
            git \
            zip \
            unzip \
            python3-pip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            cmake \
            ninja-build
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

      - name: Install Android SDK and NDK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          
          # Устанавливаем SDK через sdkmanager (работает с Java 17)
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip commandlinetools-linux-11076708_latest.zip
          mkdir -p android-sdk/cmdline-tools
          mv cmdline-tools android-sdk/cmdline-tools/latest
          export ANDROID_SDK_ROOT=$PWD/android-sdk
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
          
          # Используем Java 17 для sdkmanager
          yes | sdkmanager --licenses --sdk_root=$ANDROID_SDK_ROOT
          sdkmanager "build-tools;33.0.2" --sdk_root=$ANDROID_SDK_ROOT
          sdkmanager "platform-tools" --sdk_root=$ANDROID_SDK_ROOT
          sdkmanager "platforms;android-30" --sdk_root=$ANDROID_SDK_ROOT
          sdkmanager "tools" --sdk_root=$ANDROID_SDK_ROOT
          
          # Устанавливаем NDK
          wget https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip android-ndk-r25c-linux.zip
          mv android-ndk-r25c android-ndk

      - name: Set environment variables
        run: |
          echo "ANDROID_SDK_ROOT=$PWD/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$PWD/android-ndk" >> $GITHUB_ENV
          echo "$PWD/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$PWD/android-sdk/platform-tools" >> $GITHUB_PATH
          echo "$PWD/android-sdk/build-tools/33.0.2" >> $GITHUB_PATH
          echo "$PWD/android-ndk" >> $GITHUB_PATH

      - name: Install python-for-android
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install cython setuptools wheel
          python3 -m pip install python-for-android

      - name: Build APK with p4a
        run: |
          export ANDROID_SDK_ROOT=$PWD/android-sdk
          export ANDROID_NDK_ROOT=$PWD/android-ndk
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/build-tools/33.0.2:$ANDROID_NDK_ROOT:$PATH
          
          p4a apk \
            --private . \
            --package=com.artum4ik.noctapp \
            --name "Noct Interpreter" \
            --version 1.0 \
            --bootstrap=sdl2 \
            --requirements=python3,kivy \
            --arch arm64-v8a \
            --android-api 30 \
            --sdk-dir $ANDROID_SDK_ROOT \
            --ndk-dir $ANDROID_NDK_ROOT \
            --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: noct-app
          path: dist/*.apk
          retention-days: 30
