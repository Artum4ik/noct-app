name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Java 17 and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            openjdk-17-jdk \
            git \
            zip \
            unzip \
            python3-pip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

      - name: Install Android SDK and aidl (with Java 17 fix)
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip commandlinetools-linux-11076708_latest.zip
          mkdir -p android-sdk/cmdline-tools
          mv cmdline-tools android-sdk/cmdline-tools/latest
          export ANDROID_SDK_ROOT=$PWD/android-sdk
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
          
          # Добавляем недостающие JAR-файлы для Java 17
          wget https://repo1.maven.org/maven2/javax/xml/bind/jaxb-api/2.3.1/jaxb-api-2.3.1.jar
          wget https://repo1.maven.org/maven2/com/sun/xml/bind/jaxb-impl/2.3.1/jaxb-impl-2.3.1.jar
          wget https://repo1.maven.org/maven2/javax/activation/activation/1.1.1/activation-1.1.1.jar
          mkdir -p android-sdk/lib
          mv *.jar android-sdk/lib/
          
          yes | sdkmanager --licenses --sdk_root=$ANDROID_SDK_ROOT
          sdkmanager "build-tools;33.0.2" --sdk_root=$ANDROID_SDK_ROOT
          sdkmanager "platform-tools" --sdk_root=$ANDROID_SDK_ROOT
          sdkmanager "platforms;android-30" --sdk_root=$ANDROID_SDK_ROOT
          sdkmanager "tools" --sdk_root=$ANDROID_SDK_ROOT

      - name: Set environment variables
        run: |
          echo "ANDROID_SDK_ROOT=$PWD/android-sdk" >> $GITHUB_ENV
          echo "$PWD/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$PWD/android-sdk/platform-tools" >> $GITHUB_PATH
          echo "$PWD/android-sdk/build-tools/33.0.2" >> $GITHUB_PATH
          echo "$PWD/android-sdk/lib" >> $GITHUB_PATH

      - name: Link SDK for Buildozer
        run: |
          mkdir -p ~/.buildozer/android/platform
          rm -rf ~/.buildozer/android/platform/android-sdk
          ln -s $PWD/android-sdk ~/.buildozer/android/platform/android-sdk

      - name: Install Python packages
        run: |
          pip install --user cython buildozer
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          export ANDROID_SDK_ROOT=$PWD/android-sdk
          export PATH=$ANDROID_SDK_ROOT/build-tools/33.0.2:$ANDROID_SDK_ROOT/lib:$PATH
          buildozer android debug deploy run
        env:
          ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
