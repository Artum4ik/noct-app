name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          openjdk-17-jdk \
          autoconf \
          libtool \
          libtool-bin \
          autoconf-archive \
          automake \
          pkg-config \
          zlib1g-dev \
          build-essential \
          git \
          wget \
          unzip \
          libffi-dev \
          libssl-dev \
          zip \
          python3-pip \
          python3-dev \
          python3-venv \
          m4

    - name: Install older autoconf and libtool
      run: |
        wget https://ftp.gnu.org/gnu/autoconf/autoconf-2.69.tar.gz
        tar -xzf autoconf-2.69.tar.gz
        cd autoconf-2.69
        ./configure --prefix=/usr
        make
        sudo make install
        cd ..
        
        wget https://ftp.gnu.org/gnu/libtool/libtool-2.4.6.tar.gz
        tar -xzf libtool-2.4.6.tar.gz
        cd libtool-2.4.6
        ./configure --prefix=/usr
        make
        sudo make install
        cd ..

    - name: Install Android SDK and NDK
      run: |
        # SDK
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip commandlinetools-linux-11076708_latest.zip
        mkdir -p android-sdk/cmdline-tools
        mv cmdline-tools android-sdk/cmdline-tools/latest
        export ANDROID_SDK_ROOT=$PWD/android-sdk
        export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
        yes | sdkmanager --licenses
        sdkmanager "build-tools;33.0.2"
        sdkmanager "platform-tools"
        sdkmanager "platforms;android-30"
        sdkmanager "tools"
        
        # NDK
        wget https://dl.google.com/android/repository/android-ndk-r28c-linux.zip
        unzip android-ndk-r28c-linux.zip
        mv android-ndk-r28c android-ndk

    - name: Set up environment variables
      run: |
        echo "ANDROID_SDK_ROOT=$PWD/android-sdk" >> $GITHUB_ENV
        echo "ANDROID_NDK_ROOT=$PWD/android-ndk" >> $GITHUB_ENV
        echo "$PWD/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$PWD/android-sdk/platform-tools" >> $GITHUB_PATH
        echo "$PWD/android-sdk/build-tools/33.0.2" >> $GITHUB_PATH
        echo "$PWD/android-ndk" >> $GITHUB_PATH
        echo "/usr/local/bin" >> $GITHUB_PATH

    - name: Install Python, Cython and p4a
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install --user cython setuptools wheel
        python3 -m pip install --user python-for-android
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Checkout code
      run: |
        git clone https://github.com/${{ github.repository }}.git repo
        cd repo
        git checkout ${{ github.sha }}
        cp -r * ..
        cd ..

    - name: Build APK with p4a
      run: |
        export ANDROID_SDK_ROOT=$PWD/android-sdk
        export ANDROID_NDK_ROOT=$PWD/android-ndk
        export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/build-tools/33.0.2:$ANDROID_NDK_ROOT:/usr/local/bin:$HOME/.local/bin:$PATH
        export AUTOCONF_VERSION=2.69
        export AUTOMAKE_VERSION=1.16
        
        p4a apk \
          --private . \
          --package=com.artum4ik.noctapp \
          --name "Noct Interpreter" \
          --version 1.0 \
          --bootstrap=sdl2 \
          --requirements=python3,kivy \
          --arch arm64-v8a \
          --android-api 30 \
          --sdk-dir $ANDROID_SDK_ROOT \
          --ndk-dir $ANDROID_NDK_ROOT \
          --debug
      env:
        BUILD_NUMBER: ${{ github.run_number }}

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: noct-app
        path: dist/*.apk
        retention-days: 30
