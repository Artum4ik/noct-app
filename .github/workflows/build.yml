name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          openjdk-17-jdk \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          build-essential \
          git \
          wget \
          unzip \
          libffi-dev \
          libssl-dev \
          zip \
          python3-pip \
          python3-dev \
          python3-venv

    - name: Install Python and Buildozer
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install --user cython buildozer
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Checkout code (manual)
      run: |
        git clone https://github.com/${{ github.repository }}.git repo
        cd repo
        git checkout ${{ github.sha }}
        cp -r * ..
        cd ..

    - name: Build APK
      run: |
        buildozer android debug deploy run
      env:
        BUILD_NUMBER: ${{ github.run_number }}

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: noct-app
        path: bin/*.apk
        retention-days: 30
